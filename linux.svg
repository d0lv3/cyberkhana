<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cmdClip">
      <rect x="14.3" y="1" width="0" height="3">
        <animate attributeName="width" values="0; 15; 15" keyTimes="0; 0.15; 1" dur="6s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <g font-family="monospace" font-size="1.1" font-weight="bold">
    <text x="1" y="3" fill="#00A8B5">root@cyberkhana:~#</text>
    <text x="14.5" y="3" fill="#D91E18" clip-path="url(#cmdClip)">./exploit</text>
    
    <text x="1" y="5" fill="#00A8B5" opacity="0">
      [*] Bypassing KERN-XXX...
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.25; 0.26; 1" dur="6s" repeatCount="indefinite" />
    </text>

    <text x="1" y="7" fill="#D91E18" opacity="0">
      [+] Root access granted!
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.45; 0.46; 1" dur="6s" repeatCount="indefinite" />
    </text>
    
    <text x="1" y="9" fill="#00A8B5" opacity="0">
      root@cyberkhana:~#
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.65; 0.66; 1" dur="6s" repeatCount="indefinite" />
    </text>

    <text x="14.5" y="9" fill="#00A8B5" opacity="0">
      _
      <animate attributeName="opacity" values="0; 0; 1; 0; 1; 0; 1; 0; 1; 0" keyTimes="0; 0.65; 0.66; 0.7; 0.75; 0.8; 0.85; 0.9; 0.95; 1" dur="6s" repeatCount="indefinite" />
    </text>

    <text x="30" y="0" fill="#00A8B5" opacity="0.4" font-size="1">
      01
      <animate attributeName="y" values="-2;35" dur="4s" repeatCount="indefinite" />
    </text>
  </g>
</svg>